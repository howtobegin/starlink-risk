version: '2.1'

services:
  slr_server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: slr-server
    restart: always
    ports:
      - "48888:48888"
    volumes:
      - logs:/slr-server/logs
      - data:/slr-server/data
    extra_hosts:
      - "one:10.0.0.17"
      - "two:10.0.0.74"
      - "three:10.0.0.2"
      - "four:10.0.0.76"
      - "five:10.0.0.77"
      - "six:10.0.0.78"
    mem_limit: 8g

volumes:
  data:
  logs: