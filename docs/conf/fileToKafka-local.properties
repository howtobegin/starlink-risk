# define
slr_local.sources=r1
slr_local.sinks=k1
slr_local.channels=c1

# source
slr_local.sources.r1.type=TAILDIR
slr_local.sources.r1.positionFile=/home/lbs/software/flume/position/taildir_position_local.json
slr_local.sources.r1.filegroups=g1
slr_local.sources.r1.filegroups.g1=/home/lbs/docker/nginx/logs/slr_event_local.*
slr_local.sources.r1.batchSize=1
slr_local.sources.r1.fileHeader=true

# sink
slr_local.sinks.k1.type=org.apache.flume.sink.kafka.KafkaSink
slr_local.sinks.k1.kafka.bootstrap.servers=one:9092,two:9092,three:9092
slr_local.sinks.k1.kafka.topic=starlink_risk_event_local
slr_local.sinks.k1.kafka.flumeBatchSize=1000
slr_local.sinks.k1.kafka.producer.acks=1
slr_local.sinks.k1.kafka.producer.linger.ms=1000

# channel
slr_local.channels.c1.type=memory
slr_local.channels.c1.capacity=10000
slr_local.channels.c1.transactionCapacity=2000

# bind
slr_local.sources.r1.channels=c1
slr_local.sinks.k1.channel=c1
