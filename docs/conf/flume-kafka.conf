# define
slr.sources = r1
slr.sinks = k1
slr.channels = c1

# source
slr.sources.r1.type = TAILDIR
slr.sources.r1.positionFile = /home/lbs/software/flume/position/taildir_position.json
slr.sources.r1.filegroups = g1
slr.sources.r1.filegroups.g1 = /home/lbs/docker/nginx/logs/backend_report_*
slr.sources.r1.batchSize = 10
slr.sources.r1.fileHeader = false

# sink
slr.sinks.k1.type = org.apache.flume.sink.kafka.KafkaSink
slr.sinks.k1.kafka.bootstrap.servers = localhost:9096,localhost:9097,localhost:9098
slr.sinks.k1.kafka.topic = starlink_risk_event
slr.sinks.k1.kafka.flumeBatchSize = 1000
slr.sinks.k1.kafka.producer.acks = 1
slr.sinks.k1.kafka.producer.linger.ms = 1000

# channel
slr.channels.c1.type = memory
slr.channels.c1.capacity = 1000
slr.channels.c1.transactionCapacity = 100

# bind
slr.sources.r1.channels = c1
slr.sinks.k1.channel = c1
