# define
slr_test.sources=r1
slr_test.sinks=k1
slr_test.channels=c1
# source
slr_test.sources.r1.type=TAILDIR
slr_test.sources.r1.positionFile=/home/lbs/software/flume/position/taildir_position_test.json
slr_test.sources.r1.filegroups=g1
slr_test.sources.r1.filegroups.g1=/home/lbs/docker/nginx/logs/slr_event_test.*
slr_test.sources.r1.batchSize=1000
slr_test.sources.r1.fileHeader=true
# channel
slr_test.channels.c1.type=memory
slr_test.channels.c1.capacity=100000
slr_test.channels.c1.transactionCapacity=10000
# sink
slr_test.sinks.k1.type=org.apache.flume.sink.kafka.KafkaSink
slr_test.sinks.k1.kafka.bootstrap.servers=one:9092,two:9092,three:9092
slr_test.sinks.k1.kafka.topic=starlink_risk_event_test
slr_test.sinks.k1.kafka.flumeBatchSize=1000
slr_test.sinks.k1.kafka.producer.acks=1
slr_test.sinks.k1.kafka.producer.linger.ms=1000
# bind
slr_test.sources.r1.channels=c1
slr_test.sinks.k1.channel=c1
