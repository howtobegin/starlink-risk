# define
slr_test.sources=r1
slr_test.channels=c1

# source
slr_test.sources.r1.type=TAILDIR
slr_test.sources.r1.positionFile=/home/lbs/software/flume/data/position/taildir_position_test.json
slr_test.sources.r1.filegroups=g1
slr_test.sources.r1.filegroups.g1=/home/lbs/docker/nginx/logs/slr_event_test.*
slr_test.sources.r1.batchSize=10000
slr_test.sources.r1.interceptors=i1
slr_test.sources.r1.interceptors.i1.type=com.liboshuai.slr.flume.interceptor.KafkaKeyInterceptor$Builder

# channel
slr_test.channels.c1.type=org.apache.flume.channel.kafka.KafkaChannel
slr_test.channels.c1.kafka.bootstrap.servers=one:9092,two:9092,three:9092
slr_test.channels.c1.kafka.topic=starlink_risk_event_test
slr_test.channels.c1.parseAsFlumeEvent=false
slr_test.channels.c1.kafka.producer.acks=1
slr_test.channels.c1.kafka.producer.batch.size=10000
slr_test.channels.c1.kafka.producer.linger.ms=1000

# bind
slr_test.sources.r1.channels=c1
