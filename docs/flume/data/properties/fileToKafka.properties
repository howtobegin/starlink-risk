############################################ local \u73AF\u5883 #############################################
# define
flume-slr-local.sources=r1
flume-slr-local.channels=c1

# source
flume-slr-local.sources.r1.type=TAILDIR
flume-slr-local.sources.r1.positionFile=/home/lbs/software/flume/data/position/taildir_position_local.json
flume-slr-local.sources.r1.filegroups=g1
flume-slr-local.sources.r1.filegroups.g1=/home/lbs/docker/nginx/logs/slr_event_local.*
flume-slr-local.sources.r1.batchSize=5000
flume-slr-local.sources.r1.interceptors=i1
flume-slr-local.sources.r1.interceptors.i1.type=com.liboshuai.slr.flume.interceptor.KafkaKeyInterceptor$Builder

# channel
flume-slr-local.channels.c1.type=org.apache.flume.channel.kafka.KafkaChannel
flume-slr-local.channels.c1.kafka.bootstrap.servers=one:9092,two:9092,three:9092
flume-slr-local.channels.c1.kafka.topic=starlink_risk_event_local
flume-slr-local.channels.c1.parseAsFlumeEvent=false
flume-slr-local.channels.c1.kafka.producer.acks=1
flume-slr-local.channels.c1.kafka.producer.batch.size=5000
flume-slr-local.channels.c1.kafka.producer.linger.ms=1000

# bind
flume-slr-local.sources.r1.channels=c1
