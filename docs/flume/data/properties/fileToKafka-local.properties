# define
slr_local.sources=r1
slr_local.channels=c1

# source
slr_local.sources.r1.type=TAILDIR
slr_local.sources.r1.positionFile=/home/lbs/software/flume/data/position/taildir_position_local.json
slr_local.sources.r1.filegroups=g1
slr_local.sources.r1.filegroups.g1=/home/lbs/docker/nginx/logs/slr_event_local.*
slr_local.sources.r1.batchSize=1
slr_local.sources.r1.interceptors=i1
slr_local.sources.r1.interceptors.i1.type=com.liboshuai.slr.flume.interceptor.KafkaKeyInterceptor

# channel
slr_local.channels.c1.type=org.apache.flume.channel.kafka.KafkaChannel
slr_local.channels.c1.kafka.bootstrap.servers=one:9092,two:9092,three:9092
slr_local.channels.c1.kafka.topic=starlink_risk_event_local
slr_local.channels.c1.partitionIdHeader=kafkaKey
slr_local.channels.c1.kafka.producer.acks=1
slr_local.channels.c1.kafka.producer.batch.size=1
slr_local.channels.c1.kafka.producer.linger.ms=1000

# bind
slr_local.sources.r1.channels=c1
